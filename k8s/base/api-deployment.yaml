apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  labels:
    app: eventspine
    component: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: eventspine
      component: api
  template:
    metadata:
      labels:
        app: eventspine
        component: api
    spec:
      containers:
      - name: api
        image: eventspine-api:latest
        ports:
        - containerPort: 3000
        envFrom:
        - configMapRef:
            name: eventspine-config
        - secretRef:
            name: eventspine-secrets
        livenessProbe:
          httpGet:
            path: /api/v1/health
            port: 3000
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /api/v1/health
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "200m"
            memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: api
spec:
  selector:
    app: eventspine
    component: api
  ports:
  - protocol: TCP
    port: 80
    targetPort: 3000
  type: ClusterIP

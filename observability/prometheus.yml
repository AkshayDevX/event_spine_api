global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'eventspine-api'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['api:3000']

  - job_name: 'eventspine-worker'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['worker:3000']

  - job_name: 'eventspine-db'
    static_configs:
      - targets: ['postgres-exporter:9187']
